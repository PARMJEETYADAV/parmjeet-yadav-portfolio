name: 30-Min LinkedIn Sync

on:
  schedule:
    - cron: '*/30 * * * *' # Runs exactly every 30 minutes
  workflow_dispatch: # Allows you to run it manually from GitHub if you want

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch LinkedIn Data
        run: |
          # Replace this URL with your third-party LinkedIn scraper API endpoint
          # Use GitHub Secrets for your API keys so they stay hidden
          curl -s "https://api.scraper-provider.com/profile?url=YOUR_LINKEDIN_URL" \
          -H "Authorization: Bearer ${{ secrets.LINKEDIN_API_KEY }}" > data/linkedin.json

      - name: Commit and Push Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/linkedin.json
          # Only commit if the file actually changed to avoid empty loops
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated LinkedIn stats update" && git push)
